# Stable: default n8n 2.x (chart n8nVersion.default)

image:
  tag: "2.17.3"

n8nVersion:
  selection: "stable"
  default: "2.17.3"

# Recommended settings for production use
resources:
  limits:
    cpu: 1000m
    memory: 4096Mi
  requests:
    cpu: 500m
    memory: 512Mi

persistence:
  enabled: true
  size: 20Gi

# Enable basic auth for security
n8n:
  basicAuth:
    enabled: true
  telemetry:
    enabled: false
  logs:
    level: info 